    - number: '14'
      name: testing-strategy-reliability
      title: Testing Strategy & Reliability Engineering
      description: Integration testing, end-to-end testing, harnesses, mocks, fixtures, determinism
      purpose: >-
        Studies testing philosophy and infrastructure — integration testing approach, end-to-end test harnesses, mocking
        strategies, test fixtures, deterministic testing of concurrent/async code, and reliability engineering
