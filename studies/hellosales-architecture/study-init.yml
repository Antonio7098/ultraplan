      steps:
        - Read prompts/base.md for execution instructions.
        - Identify the workflow execution model (DAG, state machine, actor, etc.).
        - Examine how workflow state is persisted and resumed after interruption.
        - Look for checkpointing, compensation (Saga), and retry-at-step semantics.
        - Evaluate how parallel branches, joins, and error paths are modelled.
      evidence:
        - Workflow definition DSL or configuration model
        - State persistence and checkpoint/recovery mechanism
        - Step-level retry and timeout configuration
        - Parallel execution and join patterns
        - Compensation or rollback logic for failed workflows
      questions:
        - How are multi-step workflows defined, stored, and executed?
        - What happens when a workflow is interrupted mid-step — can it resume?
        - How are parallel workflow branches coordinated and joined?
        - How does the system handle workflow-level timeouts and cancellations?
        - Is there compensation logic for partial workflow failures?
    - number: '13'
      name: extensibility-plugin-architecture
