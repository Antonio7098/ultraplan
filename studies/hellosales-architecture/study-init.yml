    - number: '15'
      name: performance-resource-discipline
      title: Performance & Resource Discipline
      description: Memory allocation, pooling, streaming, batching, lazy loading, query optimization
      purpose: >-
        Examines performance and resource management — memory allocation patterns, object pooling, streaming versus
        buffering, batching strategy, lazy loading, query optimization, and profiling discipline. For AI/data systems
        where a single pipeline can process GBs, resource discipline separates production-ready from prototype.
      steps:
        - Read prompts/base.md for execution instructions.
        - Identify memory management patterns (pooling, reuse, zero-alloc).
        - Examine streaming vs buffering choices in data paths.
        - Look for batching strategies in I/O, DB, and API calls.
        - Evaluate profiling, benchmarking, and optimisation culture.
      evidence:
        - Object pool or sync.Pool usage
        - Streaming readers/writers vs in-memory buffers
        - Batch processing parameters and flush thresholds
        - Benchmark tests and performance regression detection
        - Pprof or tracing-based optimisation evidence
      questions:
        - How does the system avoid allocating memory proportional to data size?
        - Where does the system buffer vs stream, and what drives the choice?
        - How are batch sizes tuned and what happens at batch boundaries?
        - Is there a performance regression testing culture?
        - What profiling tools are used to identify bottlenecks?
